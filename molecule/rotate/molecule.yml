---
dependency:
  name: shell
  command: >-
    ansible-galaxy collection install ${MOLECULE_SCENARIO_DIRECTORY}/../.. --force &&
    ansible-galaxy collection install -r ${MOLECULE_SCENARIO_DIRECTORY}/../../requirements.yml

driver:
  name: docker

platforms:
  - name: luks-rotate-test
    image: "geerlingguy/docker-ubuntu2204-ansible:latest"
    pre_build_image: true
    privileged: true
    command: ""
    volumes:
      - /dev:/dev
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /lib/modules:/lib/modules:ro
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
