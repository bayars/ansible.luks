galaxy_info:
  author: Safa Bayar
  description: >-
    Provision LUKS2-encrypted LVM logical volumes with configurable key storage.
    Supports Debian/Ubuntu and RHEL/Rocky/CentOS.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: EL
      versions:
        - "8"
        - "9"
  galaxy_tags:
    - luks
    - lvm
    - encryption
    - storage
    - security

collections:
  - community.general
  - community.crypto
  - ansible.posix

dependencies: []
