---
- hosts: localhost
  remote_user: root
  vars:
    luks_action: encrypt
    hide_logs: false
    lvm_install: false
    clevis_install: false
    spec:
      - disk_name: '/dev/sda'
        pv_number: '1'
        vg_name: 'ROOT'
        vg_path: '/dev/sda1'
        keys_path: "/vault/{{ ansible_hostname }}/secrets"
        lv_specifications:
          - lv_name: "root"
            mount_point: "/mnt/root"
            size: "5G"
            vg_group: "ROOT"
            fstype: "ext4"
          - lv_name: "backup"
            mount_point: "/mnt/backup"
            size: "100G"
            vg_group: "ROOT"
            fstype: "ext4"
        key_storage:
          type: filesystem
  roles:
    - role: bayars.luks.luks
