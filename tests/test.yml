---
- hosts: localhost
  remote_user: root
  vars:
    hide_logs: false
    lvm_install: false
    clevis_install: false
    spec:
      - disk_name: '/dev/sda'
        pv_number: '1'
        vg_name: 'ROOT'
        vg_path: '/dev/sda1'
        keys_path: "/vault/{{ ansible_hostname }}/secrets"
        lv_specifications:
          - lv_name: "root"
            mount_point: "/mnt/root"
            size: "5G"
            vg_group: "ROOT"
          - lv_name: "BACKUP"
            mount_point: "/mnt/backup"
            size: "100G"
            vg_group: "ROOT"
        key_storage:
          local_storage: true
          remote_storage: false
          remote_host: "192.168.1.1"
          remote_user: "root"
          remote_path: "/vault/{{ ansible_hostname }}/secrets"
          remote_port: "22"
          remote_key: "/vault/{{ ansible_hostname }}/secrets/ansible_rsa"
  roles:
    - role: ansible.luks
