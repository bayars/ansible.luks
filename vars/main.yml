---
# vars file for luks
# vg_path may be added with multiple device names
spec: 
  - {'disk_name': '/dev/sda', 
    'pv_number': '1', 
    'vg_name': 'ROOT',
    'vg_path': '/dev/sda1',
    'lv_specafications': [{
      'lv_name': "root",
      'mount_point': "/root",
      'size': "5G",
      'vg_group': "ROOT"
      },
      {
        'lv_name': "BACKUP",
        'mount_point': "/mnt",
        'size': "100G",
        'vg_group': "ROOT"
      }],
      'key_storage':{
        'local_storage': "true",
        'keys_path': "/vault/{{ ansible_hostname }}/secrets",
        'remote_storage': "true",
        'remote_host': "192.168.1.1",
        'remote_user': "root",
        'remote_path': "/vault/{{ ansible_hostname }}/secrets",
        'remote_port': "22",
        'remote_key': "/vault/{{ ansible_hostname }}/secrets/ansible_rsa",
      }
  }

local_storage: yes

# lvm_install: True
# clevis_install: False
