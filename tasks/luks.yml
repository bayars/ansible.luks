- name: Create all logical volumes with volume.yml. Variables included in defaults directory. Used include task because it works dynamic and sequential.
  include_tasks: lv_creation.yml
  no_log: false
  with_subelements: 
    - "{{ spec }}"
    - lv_specifications  
  loop_control:
    loop_var: disks

