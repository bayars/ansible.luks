galaxy_info:
  author: Safa Bayar
  description: >-
    Provision LUKS2-encrypted LVM logical volumes with configurable key storage.
    Supports Debian/Ubuntu, RHEL/Rocky/CentOS, and Alpine Linux.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Alpine
      versions:
        - "3.18"
        - "3.19"
        - "3.20"
  galaxy_tags:
    - luks
    - lvm
    - encryption
    - storage
    - security
    - tpm2
    - vault

collections:
  - community.general
  - community.crypto
  - ansible.posix
  - community.hashi_vault

dependencies: []
