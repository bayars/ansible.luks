---
dependency:
  name: shell
  command: >-
    ansible-galaxy collection install ${MOLECULE_SCENARIO_DIRECTORY}/../.. --force &&
    ansible-galaxy collection install -r ${MOLECULE_SCENARIO_DIRECTORY}/../../requirements.yml

driver:
  name: docker

platforms:
  - name: "luks-test-${MOLECULE_DISTRO:-ubuntu2204}"
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2204}-ansible:latest"
    pre_build_image: true
    privileged: true
    command: ""
    volumes:
      - /dev:/dev
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /lib/modules:/lib/modules:ro
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3

# Explicit test sequence — includes the built-in idempotency step which
# runs converge a second time and fails if any task reports 'changed'.
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotency
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible

lint: |
  set -e
  yamllint -c ../../.yamllint.yml .
  ansible-lint converge.yml verify.yml
