---
# Action to perform: encrypt (provision) or decrypt (unlock and mount)
luks_action: encrypt

# Set true in production to suppress key paths from Ansible output
hide_logs: true

# Package installation flags
lvm_install: true
clevis_install: false

# Debian / Ubuntu
lvm_packages_debian:
  - lvm2
  - cryptsetup
  - cryptsetup-bin
  - initramfs-tools
  - rsync

clevis_packages_debian:
  - clevis
  - clevis-tpm2
  - clevis-systemd
  - clevis-luks
  - clevis-dracut
  - clevis-udisks2

# RHEL / Rocky Linux / CentOS
lvm_packages_redhat:
  - lvm2
  - cryptsetup
  - dracut
  - rsync

clevis_packages_redhat:
  - clevis
  - clevis-tpm2
  - clevis-systemd
  - clevis-luks
  - clevis-dracut
