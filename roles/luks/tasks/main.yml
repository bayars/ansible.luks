---
- name: Install packages
  ansible.builtin.include_tasks: packages.yml
  when: lvm_install | bool

- name: Encrypt — provision disks, create LUKS volumes
  ansible.builtin.include_tasks: luks.yml
  when: luks_action == 'encrypt'

- name: Decrypt — unlock and mount LUKS volumes
  ansible.builtin.include_tasks: decrypt.yml
  when: luks_action == 'decrypt'
