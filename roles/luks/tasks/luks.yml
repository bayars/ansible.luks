---
- name: Partition disk and set LVM flag
  community.general.parted:
    device: "{{ disk.disk_name }}"
    label: gpt
    number: "{{ disk.pv_number }}"
    state: present
    fs_type: ext4
    flags: [lvm]
  loop: "{{ luks_spec }}"
  loop_control:
    loop_var: disk
    label: "{{ disk.disk_name }}"

- name: Create LVM volume groups
  community.general.lvg:
    vg: "{{ disk.vg_name }}"
    pvs: "{{ disk.vg_path }}"
  loop: "{{ luks_spec }}"
  loop_control:
    loop_var: disk
    label: "{{ disk.vg_name }}"

- name: Create key storage directories
  ansible.builtin.file:
    state: directory
    path: "{{ disk.keys_path }}"
    owner: root
    group: root
    mode: "0700"
  no_log: "{{ luks_hide_logs }}"
  loop: "{{ luks_spec }}"
  loop_control:
    loop_var: disk
    label: "{{ disk.vg_name }}"

# Dispatch to the correct key storage backend per disk/lv pair.
# filesystem / remote_filesystem / tpm2 → generate.yml (keyfile on disk)
# vault                                 → vault.yml     (keyfile + Vault KV write)
- name: Generate / store key files
  ansible.builtin.include_tasks:
    file: "key_storage/{{ 'vault.yml' if disks.0.key_storage.type == 'vault' else 'generate.yml' }}"
  loop: "{{ luks_spec | subelements('lv_specifications') }}"
  loop_control:
    loop_var: disks
    label: "{{ disks.0.vg_name }}/{{ disks.1.lv_name }}"

- name: Sync key directory to remote host
  ansible.builtin.include_tasks: key_storage/sync_remote.yml
  loop: "{{ luks_spec }}"
  loop_control:
    loop_var: disk
    label: "{{ disk.vg_name }}"
  when: disk.key_storage.type == 'remote_filesystem'

- name: Provision logical volumes and LUKS containers
  ansible.builtin.include_tasks: lv_creation.yml
  no_log: "{{ luks_hide_logs }}"
  loop: "{{ luks_spec | subelements('lv_specifications') }}"
  loop_control:
    loop_var: disks
    label: "{{ disks.0.vg_name }}/{{ disks.1.lv_name }}"
