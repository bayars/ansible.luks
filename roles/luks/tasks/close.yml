---
# Gracefully unmounts and closes all LUKS volumes defined in spec.
# Safe to run on live systems — unmounts before closing the container.

- name: Unmount LUKS volume {{ disks.1.mount_point }}
  ansible.posix.mount:
    path: "{{ disks.1.mount_point }}"
    state: unmounted
  loop: "{{ spec | subelements('lv_specifications') }}"
  loop_control:
    loop_var: disks
    label: "{{ disks.0.vg_name }}/{{ disks.1.lv_name }}"
  when: disks.1.fstype | default('ext4') != 'swap'

- name: Disable swap on luks-{{ disks.1.lv_name }}
  ansible.builtin.command: swapoff /dev/mapper/luks-{{ disks.1.lv_name }}
  loop: "{{ spec | subelements('lv_specifications') }}"
  loop_control:
    loop_var: disks
    label: "{{ disks.0.vg_name }}/{{ disks.1.lv_name }}"
  when: disks.1.fstype | default('ext4') == 'swap'
  changed_when: true
  failed_when: false

- name: Close LUKS container luks-{{ disks.1.lv_name }}
  community.crypto.luks_device:
    name: "luks-{{ disks.1.lv_name }}"
    state: closed
  loop: "{{ spec | subelements('lv_specifications') }}"
  loop_control:
    loop_var: disks
    label: "{{ disks.0.vg_name }}/{{ disks.1.lv_name }}"
