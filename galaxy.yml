namespace: bayars
name: luks
version: 1.0.0
readme: README.md
authors:
  - Safa Bayar <bayarsafa@gmail.com>
description: >-
  Provision and manage LUKS2-encrypted LVM logical volumes.
  Supports Debian/Ubuntu and RHEL/Rocky/CentOS.
  Configurable key storage backends (local filesystem, remote filesystem).
  Includes encrypt and decrypt playbooks.
license:
  - MIT
tags:
  - luks
  - lvm
  - encryption
  - storage
  - security
  - linux
  - cryptsetup
repository: https://github.com/bayars/ansible.luks
documentation: https://github.com/bayars/ansible.luks
homepage: https://github.com/bayars/ansible.luks
issues: https://github.com/bayars/ansible.luks/issues
build_ignore:
  - .github/
  - .yamllint.yml
  - .ansible-lint
  - molecule/
  - tests/
  - ansible.cfg
  - hosts
dependencies: {}
