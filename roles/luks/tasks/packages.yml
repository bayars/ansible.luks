---
- name: Install LVM and LUKS packages (Debian / Ubuntu)
  ansible.builtin.apt:
    name: "{{ luks_lvm_packages_debian }}"
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Install LVM and LUKS packages (RHEL / Rocky / CentOS)
  ansible.builtin.dnf:
    name: "{{ luks_lvm_packages_redhat }}"
    state: present
  when: ansible_os_family == 'RedHat'

- name: Install LVM and LUKS packages (Alpine Linux)
  community.general.apk:
    name: "{{ luks_lvm_packages_alpine }}"
    state: present
    update_cache: true
  when: ansible_os_family == 'Alpine'

- name: Install Clevis packages (Debian / Ubuntu)
  ansible.builtin.apt:
    name: "{{ luks_clevis_packages_debian }}"
    state: present
  when:
    - luks_clevis_install | bool
    - ansible_os_family == 'Debian'

- name: Install Clevis packages (RHEL / Rocky / CentOS)
  ansible.builtin.dnf:
    name: "{{ luks_clevis_packages_redhat }}"
    state: present
  when:
    - luks_clevis_install | bool
    - ansible_os_family == 'RedHat'

- name: Install Clevis packages (Alpine Linux)
  community.general.apk:
    name: "{{ luks_clevis_packages_alpine }}"
    state: present
  when:
    - luks_clevis_install | bool
    - ansible_os_family == 'Alpine'
