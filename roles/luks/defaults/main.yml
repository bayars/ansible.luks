---
# Action to perform: encrypt | decrypt | close | rotate
luks_action: encrypt

# Set true in production to suppress key paths from Ansible output
hide_logs: true

# Package installation flags
lvm_install: true
clevis_install: false

# ── Debian / Ubuntu ────────────────────────────────────────────────────────
lvm_packages_debian:
  - lvm2
  - cryptsetup
  - cryptsetup-bin
  - initramfs-tools
  - rsync
  - xfsprogs
  - btrfs-progs
  - e2fsprogs

clevis_packages_debian:
  - clevis
  - clevis-tpm2
  - clevis-systemd
  - clevis-luks
  - clevis-dracut
  - clevis-udisks2

# ── RHEL / Rocky Linux / CentOS ───────────────────────────────────────────
lvm_packages_redhat:
  - lvm2
  - cryptsetup
  - dracut
  - rsync
  - xfsprogs
  - btrfs-progs
  - e2fsprogs

clevis_packages_redhat:
  - clevis
  - clevis-tpm2
  - clevis-systemd
  - clevis-luks
  - clevis-dracut

# ── Alpine Linux ──────────────────────────────────────────────────────────
lvm_packages_alpine:
  - lvm2
  - cryptsetup
  - e2fsprogs
  - btrfs-progs
  - xfsprogs
  - rsync
  - util-linux
  - eudev

clevis_packages_alpine:
  - clevis

# ── TPM2 defaults (key_storage.type == tpm2) ─────────────────────────────
tpm2_pcr_bank: "sha256"
tpm2_pcr_ids: "1,7"
tpm2_keep_keyfile: true   # keep keyfile as backup LUKS slot after Clevis bind
