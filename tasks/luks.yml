---
- name: Change disks partition table format and format with ext4
  parted:
    device: "{{ disks.disk_name }}"
    label: gpt
    number: 1
    state: present
    fs_type: ext4
    flags: [ lvm ]
  no_log: false
  with_items: "{{ spec }}" 
  loop_control:
    loop_var: disks

- name: Create volume groups 
  lvg:
    vg: "{{ disks.vg_name }}"
    pvs: "{{ disks.vg_path }}"
  no_log: false
  with_items: "{{ spec }}" 
  loop_control:
    loop_var: disks

- name: Create vault directory
  file:
    state: directory
    path: "{{ disks.keys_path }}"
    owner: root
    group: root
    mode: "0700"
  no_log: false
  with_items: "{{ spec }}"
  loop_control:
    loop_var: disks

- name: Check vault key directory
  stat:
    path: "{{ disks.0.keys_path }}"
  register: is_vault_key_files_exist
  no_log: false
  with_subelements: 
    - "{{ spec }}"
    - lv_specifications  
  loop_control:
    loop_var: disks

- name: Check vault key file creation
  command: sh -c "dd if=/dev/urandom of={{ disks.0.keys_path }}/{{ disks.1.lv_name }} bs=1024 count=4"
  args:
    chdir: "{{ disks.0.keys_path }}"
    creates: "{{ disks.0.keys_path }}/{{ disks.1.lv_name }}"
  no_log: false
  with_subelements: 
    - "{{ spec }}"
    - lv_specifications  
  loop_control:
    loop_var: disks

- name: Check vault key file permissions
  file:
    state: file
    path: "{{ disks.0.keys_path }}/{{ disks.1.lv_name }}"
    owner: root
    group: root
    mode: "0500"
  no_log: false
  with_subelements: 
    - "{{ spec }}"
    - lv_specifications  
  loop_control:
    loop_var: disks

